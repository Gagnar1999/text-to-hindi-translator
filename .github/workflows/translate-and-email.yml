name: Translate Text File to Hindi

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - 'uploads/**/*.txt'

permissions:
  contents: write
  pull-requests: read

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Fetch base branch for diff
        run: |
          git remote add base_repo https://github.com/${{ github.repository }}.git
          git fetch base_repo ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get changed txt files
        id: changed-files
        run: |
          FILES=$(git diff --name-only --diff-filter=A base_repo/${{ github.event.pull_request.base.ref }}...HEAD -- 'uploads/*.txt' | grep -v '_hindi\.txt$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Detected files:"
          echo "$FILES"

      - name: Translate files
        if: steps.changed-files.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: python scripts/translate_and_email.py

      - name: Commit translated files
        if: steps.changed-files.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p hindi_translated
          git add hindi_translated/
          git diff --cached --quiet || git commit -m "Add Hindi translation(s)"
          git push
